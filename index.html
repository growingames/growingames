<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Growin organiza rotina, atividades terapêuticas gamificadas e acompanhamento visual para apoiar o neurodesenvolvimento infantil.">
  <meta name="robots" content="index,follow">

  <meta name="color-scheme" content="light">
  <meta name="application-name" content="Growin">

  <meta property="og:type" content="website">
  <meta property="og:locale" content="pt_BR">
  <meta property="og:title" content="Growin | Rotina e atividades para neurodesenvolvimento infantil">
  <meta property="og:description" content="Rotina visual, atividades adaptativas e progresso semanal para famílias acompanharem o desenvolvimento da criança.">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Growin | Apoio ao neurodesenvolvimento infantil">
  <meta name="twitter:description" content="Atividades gamificadas, rotina visual e acompanhamento simples para famílias.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Growin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Growin | Rotina e atividades para neurodesenvolvimento infantil</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --growin-blue-strong: #0c5fbd;
      --growin-blue: #3197f4;
      --growin-sky: #8ed3ff;
      --growin-ink: #173d6b;
      --growin-ink-soft: rgba(23, 61, 107, 0.72);
      --growin-shell: rgba(255, 255, 255, 0.88);
      --growin-shell-line: rgba(255, 255, 255, 0.44);
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.24), transparent 55%),
        linear-gradient(135deg, #0c5fbd 0%, #3197f4 54%, #8ed3ff 100%);
      color: #173d6b;
      font-family: "Nunito", Arial, sans-serif;
    }

    body {
      overflow: hidden;
    }

    #app-bootstrap-shell {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.28), transparent 56%),
        linear-gradient(135deg, var(--growin-blue-strong) 0%, var(--growin-blue) 54%, var(--growin-sky) 100%);
      transition: opacity 240ms ease, visibility 240ms ease;
    }

    #app-bootstrap-shell.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .bootstrap-card {
      width: min(100%, 360px);
      padding: 24px 22px;
      border-radius: 28px;
      background: var(--growin-shell);
      border: 1px solid var(--growin-shell-line);
      box-shadow: 0 22px 60px rgba(12, 56, 113, 0.24);
      backdrop-filter: blur(18px);
    }

    .bootstrap-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .bootstrap-mark {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(238, 248, 255, 0.92));
      box-shadow: inset 0 0 0 1px rgba(14, 111, 216, 0.12);
    }

    .bootstrap-mark svg {
      width: 34px;
      height: 34px;
    }

    .bootstrap-copy h1,
    .bootstrap-copy p {
      margin: 0;
    }

    .bootstrap-copy h1 {
      color: var(--growin-ink);
      font-size: 28px;
      line-height: 1.04;
      letter-spacing: -0.02em;
      font-weight: 900;
    }

    .bootstrap-copy p {
      margin-top: 6px;
      color: var(--growin-ink-soft);
      font-size: 15px;
      line-height: 1.45;
      font-weight: 700;
    }

    .bootstrap-progress {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .bootstrap-dots {
      display: flex;
      gap: 10px;
    }

    .bootstrap-dots span {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: rgba(14, 111, 216, 0.18);
      animation: bootstrapPulse 1.1s ease-in-out infinite;
    }

    .bootstrap-dots span:nth-child(1) {
      animation-delay: 0ms;
      background: rgba(255, 120, 120, 0.82);
    }

    .bootstrap-dots span:nth-child(2) {
      animation-delay: 120ms;
      background: rgba(63, 189, 118, 0.82);
    }

    .bootstrap-dots span:nth-child(3) {
      animation-delay: 240ms;
      background: rgba(255, 207, 92, 0.9);
    }

    .bootstrap-dots span:nth-child(4) {
      animation-delay: 360ms;
      background: rgba(49, 151, 244, 0.82);
    }

    .bootstrap-footnote {
      color: var(--growin-ink-soft);
      font-size: 14px;
      line-height: 1.4;
      font-weight: 700;
    }

    @keyframes bootstrapPulse {
      0%, 100% {
        transform: translateY(0) scale(0.92);
        opacity: 0.58;
      }

      50% {
        transform: translateY(-3px) scale(1.06);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div id="app-bootstrap-shell" aria-live="polite">
    <div class="bootstrap-card" role="status" aria-label="Abrindo Growin">
      <div class="bootstrap-brand">
        <div class="bootstrap-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" role="presentation">
            <rect x="10" y="12" width="44" height="40" rx="12" fill="#EEF7FF"></rect>
            <path d="M22 38c4.5 6.5 15.5 6.5 20 0" fill="none" stroke="#0E6FD8" stroke-width="4" stroke-linecap="round"></path>
            <circle cx="26" cy="28" r="4" fill="#35B779"></circle>
            <circle cx="38" cy="28" r="4" fill="#FFD66B"></circle>
            <path d="M20 14l5-7 5 7" fill="none" stroke="#0E6FD8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>
        <div class="bootstrap-copy">
          <h1>Growin</h1>
          <p>Rotina, atividades e progresso com abertura mais leve no navegador.</p>
        </div>
      </div>
      <div class="bootstrap-progress">
        <div class="bootstrap-dots" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="bootstrap-footnote">Preparando sua navegação.</div>
      </div>
    </div>
  </div>
  <script>
    (function () {
      var hash = window.location.hash;
      if (!hash || !hash.startsWith('#/')) {
        return;
      }

      var baseUri = new URL(document.baseURI);
      var legacyRoute = hash.substring(1);
      var queryIndex = legacyRoute.indexOf('?');
      var routePath =
        queryIndex >= 0 ? legacyRoute.substring(0, queryIndex) : legacyRoute;
      var routeQuery =
        queryIndex >= 0 ? legacyRoute.substring(queryIndex) : '';
      var basePath = baseUri.pathname.replace(/\/$/, '');
      var targetPath =
        routePath === '/' ? baseUri.pathname : basePath + routePath;
      var targetUrl =
        baseUri.origin + targetPath + (routeQuery || window.location.search);

      window.location.replace(targetUrl);
    })();
  </script>
  <script>
    (function () {
      var shell = document.getElementById('app-bootstrap-shell');

      function hideBootstrapShell() {
        if (!shell) {
          return;
        }
        shell.classList.add('is-hidden');
        window.setTimeout(function () {
          if (shell && shell.parentNode) {
            shell.parentNode.removeChild(shell);
          }
          document.body.style.overflow = '';
        }, 260);
      }

      window.addEventListener('flutter-first-frame', hideBootstrapShell, {
        once: true
      });
      window.setTimeout(hideBootstrapShell, 8000);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
